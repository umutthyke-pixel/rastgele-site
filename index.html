.bg-orbs span:nth-child(3){width:400px;height:400px;background:var(--accent4);top:50%;left:50%;animation-delay:-10s}

function getRarity(idx){
    const hash=(idx*2654435761)>>>0;
    const r=hash%100;
    if(r<50)return{name:'SÄ±radan',cls:'rarity-common'};
    if(r<80)return{name:'Nadir',cls:'rarity-rare'};
    if(r<95)return{name:'Epik',cls:'rarity-epic'};

}

function nextFact(){
    const pool=getPool();if(!pool.length)return;
    const unseen=pool.filter(f=>!seenFacts.has(f.text));
    const src=unseen.length?unseen:pool;

    if(!seenFacts.has(fact.text))streak++;else streak=0;
    currentFact=fact;currentFactIndex=allFacts.indexOf(fact);seenFacts.add(fact.text);
    history.unshift({...fact,time:new Date().toLocaleTimeString('tr-TR')});

        em.textContent=ce;em.style.animation='none';em.offsetHeight;em.style.animation='bounceIn .5s ease';
        const cn=fact.category.split(' ').slice(1).join(' ');
        bg.textContent=cn;bg.style.background=catCol(fact.category,.2);bg.style.color=catCol(fact.category,1);
        t.textContent=fact.text;t.style.opacity=1;

        checkMS();

}

        <div class="quiz-options"><button class="quiz-opt" onclick="answerQuiz(this,'DoÄŸru','${quizQ.correct}')">âœ… DoÄŸru</button><button class="quiz-opt" onclick="answerQuiz(this,'YanlÄ±ÅŸ','${quizQ.correct}')">âŒ YanlÄ±ÅŸ</button></div></div>
        <div style="text-align:center;margin-top:12px"><button class="btn btn-secondary btn-sm" onclick="generateQuiz()">â­ï¸ Sonraki Soru</button></div>`;
    }
}
function answerQuiz(btn,answer,correct){
    if(quizAnswered)return;quizAnswered=true;quizTotal++;
    const isCorrect=answer===correct;if(isCorrect)quizScore++;
    localStorage.setItem('bh_quiz',quizScore);localStorage.setItem('bh_quizT',quizTotal);
    document.getElementById('quiz-score-top').textContent=quizScore;
    btn.parentElement.querySelectorAll('.quiz-opt').forEach(b=>{b.classList.add('disabled');if(b.textContent.includes(correct)||b.innerText===correct)b.classList.add('correct');});
    if(!isCorrect)btn.classList.add('wrong');
    if(isCorrect){showToast('âœ… DoÄŸru!');launchConfetti()}else showToast('âŒ YanlÄ±ÅŸ!')
}

// â”€â”€â”€ SHARE AS IMAGE â”€â”€â”€
function shareAsImage(){

    const c=document.getElementById('share-canvas'),ctx=c.getContext('2d');

    const g=ctx.createLinearGradient(0,0,600,400);g.addColorStop(0,'#1a1a3e');g.addColorStop(1,'#0a0a1a');
    ctx.fillStyle=g;ctx.fillRect(0,0,600,400);
    const g2=ctx.createLinearGradient(0,0,600,0);g2.addColorStop(0,'#6c63ff');g2.addColorStop(.5,'#ff6584');g2.addColorStop(1,'#ffc837');
    ctx.fillStyle=g2;ctx.fillRect(0,0,600,4);

    const words=currentFact.text.split(' ');let lines=[],line='';
    words.forEach(w=>{if(ctx.measureText(line+w).width>480){lines.push(line.trim());line=''}line+=w+' '});lines.push(line.trim());
    lines.forEach((l,i)=>ctx.fillText(l,300,160+i*30));

    const tg=ctx.createLinearGradient(200,0,400,0);tg.addColorStop(0,'#6c63ff');tg.addColorStop(1,'#ff6584');
    ctx.fillStyle=tg;ctx.fillText('âœ¨ Bilgi Hazinesi',300,370);
    c.toBlob(blob=>{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='bilgi.png';a.click();URL.revokeObjectURL(url);showToast('ğŸ–¼ï¸ GÃ¶rsel indirildi!')});
}

// â”€â”€â”€ PARTICLES â”€â”€â”€
const pCv=document.getElementById('particles'),pCx=pCv.getContext('2d');let pts=[];
function rC(){pCv.width=innerWidth;pCv.height=innerHeight}rC();addEventListener('resize',rC);
class P{constructor(){this.r()}r(){this.x=Math.random()*pCv.width;this.y=Math.random()*pCv.height;this.s=Math.random()*1.5+.5;this.sx=(Math.random()-.5)*.3;this.sy=(Math.random()-.5)*.3;this.o=Math.random()*.3+.05}u(){this.x+=this.sx;this.y+=this.sy;if(this.x<0||this.x>pCv.width||this.y<0||this.y>pCv.height)this.r()}d(){pCx.beginPath();pCx.arc(this.x,this.y,this.s,0,Math.PI*2);pCx.fillStyle=`rgba(255,255,255,${this.o})`;pCx.fill()}}
for(let i=0;i<60;i++)pts.push(new P);
function aP(){pCx.clearRect(0,0,pCv.width,pCv.height);pts.forEach(p=>{p.u();p.d()});for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<90){pCx.beginPath();pCx.strokeStyle=`rgba(255,255,255,${.04*(1-d/90)})`;pCx.lineWidth=.5;pCx.moveTo(pts[i].x,pts[i].y);pCx.lineTo(pts[j].x,pts[j].y);pCx.stroke()}}requestAnimationFrame(aP)}aP();

// â”€â”€â”€ CONFETTI â”€â”€â”€
const cC=document.getElementById('confetti'),cx=cC.getContext('2d');
function rCC(){cC.width=innerWidth;cC.height=innerHeight}rCC();addEventListener('resize',rCC);
let cPs=[];
function launchConfetti(){cPs=[];const cols=['#6c63ff','#ff6584','#ffc837','#00d2ff','#ff9a9e','#a29bfe','#55efc4','#fd79a8'];for(let i=0;i<120;i++)cPs.push({x:cC.width/2+(Math.random()-.5)*200,y:cC.height/2,vx:(Math.random()-.5)*14,vy:Math.random()*-16-5,sz:Math.random()*7+3,c:cols[Math.floor(Math.random()*cols.length)],rot:Math.random()*360,rs:(Math.random()-.5)*10,l:1});aCf()}
function aCf(){cx.clearRect(0,0,cC.width,cC.height);let a=false;cPs.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.rot+=p.rs;p.l-=.009;if(p.l>0){a=true;cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot*Math.PI/180);cx.fillStyle=p.c;cx.globalAlpha=p.l;cx.fillRect(-p.sz/2,-p.sz/2,p.sz,p.sz);cx.restore()}});if(a)requestAnimationFrame(aCf);else cx.clearRect(0,0,cC.width,cC.height)}
