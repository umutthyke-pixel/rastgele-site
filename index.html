<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilgi Hazinesi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--card:rgba(255,255,255,.06);--card-border:rgba(255,255,255,.1);--text:rgba(255,255,255,.9);--text2:rgba(255,255,255,.5);--text3:rgba(255,255,255,.25);--accent1:#6c63ff;--accent2:#ff6584;--accent3:#ffc837;--accent4:#00d2ff}
body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;color:#fff;overflow-x:hidden}
.bg-orbs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-orbs span{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;animation:floatOrb 20s ease-in-out infinite alternate}
.bg-orbs span:nth-child(1){width:600px;height:600px;background:var(--accent1);top:-10%;left:-10%}
.bg-orbs span:nth-child(2){width:500px;height:500px;background:var(--accent2);bottom:-10%;right:-10%;animation-delay:-5s}
.bg-orbs span:nth-child(3){width:400px;height:400px;background:var(--accent4);top:50%;left:50%;animation-delay:-10s}
.bg-orbs span:nth-child(4){width:350px;height:350px;background:var(--accent3);bottom:20%;left:10%;animation-delay:-15s}
@keyframes floatOrb{0%{transform:translate(0,0) scale(1)}50%{transform:translate(60px,-40px) scale(1.15)}100%{transform:translate(-30px,50px) scale(.95)}}
#particles{position:fixed;inset:0;z-index:1;pointer-events:none}
#confetti{position:fixed;inset:0;z-index:999;pointer-events:none}

.app{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;padding:16px 16px 60px;min-height:100vh}
.container{width:100%;max-width:600px}

.top-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:8px}
.nav-brand{font-weight:900;font-size:1.3rem;background:linear-gradient(135deg,var(--accent1),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-actions{display:flex;gap:6px}
.nav-btn{width:38px;height:38px;border-radius:12px;border:1px solid var(--card-border);background:var(--card);color:rgba(255,255,255,.6);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s}
.nav-btn:hover{background:rgba(255,255,255,.12);color:#fff;transform:translateY(-1px)}
.nav-btn.active-nav{color:var(--accent3);border-color:rgba(255,200,55,.3);background:rgba(255,200,55,.08)}

.stats-bar{display:flex;justify-content:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.stat{background:var(--card);border:1px solid var(--card-border);border-radius:14px;padding:7px 14px;text-align:center;min-width:75px;transition:transform .2s}
.stat:hover{transform:translateY(-2px)}
.stat .num{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat .label{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:1px}

.progress-wrap{margin-bottom:14px}
.progress-bar{height:4px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent1),var(--accent2),var(--accent3));border-radius:4px;transition:width .5s;width:0}
.progress-label{font-size:.6rem;color:var(--text3);text-align:right;margin-top:2px}

.categories{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:14px}
.cat-pill{padding:5px 12px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:rgba(255,255,255,.5);font-size:.7rem;cursor:pointer;transition:all .25s;user-select:none;white-space:nowrap}
.cat-pill:hover{background:rgba(255,255,255,.08);color:#fff;transform:translateY(-1px)}
.cat-pill.active{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;border-color:transparent;box-shadow:0 3px 12px rgba(108,99,255,.3)}

.fact-card{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:24px;border:1px solid var(--card-border);padding:30px 26px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.3);transition:transform .4s,box-shadow .4s;position:relative;overflow:hidden;margin-bottom:14px}
.fact-card:hover{transform:translateY(-3px);box-shadow:0 14px 50px rgba(0,0,0,.4)}
.fact-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent1),var(--accent2),var(--accent3))}

.rarity-badge{position:absolute;top:12px;right:12px;padding:3px 10px;border-radius:8px;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.rarity-common{background:rgba(255,255,255,.08);color:rgba(255,255,255,.4)}
.rarity-rare{background:rgba(41,182,246,.15);color:#29b6f6}
.rarity-epic{background:rgba(186,85,255,.15);color:#ba55ff}
.rarity-legendary{background:rgba(255,200,55,.15);color:#ffc837}

.fact-emoji{font-size:2.6rem;margin-bottom:10px;display:block;animation:bounceIn .5s ease}
.fact-category-badge{display:inline-block;padding:3px 10px;border-radius:8px;font-size:.6rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;font-weight:600}
.fact-text{font-weight:300;font-size:1.05rem;line-height:1.7;min-height:50px;transition:opacity .35s;color:var(--text)}
.fact-number{margin-top:12px;font-size:.65rem;color:var(--text3)}

.actions{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.btn{padding:11px 20px;border-radius:13px;border:none;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .25s;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:5px}
.btn-primary{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;box-shadow:0 4px 18px rgba(108,99,255,.3)}
.btn-primary:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 8px 28px rgba(108,99,255,.5)}
.btn-sm{padding:9px 14px;font-size:.75rem;border-radius:11px}
.btn-secondary{background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.08)}
.btn-secondary:hover{background:rgba(255,255,255,.12);color:#fff;transform:translateY(-2px)}
.btn-secondary.liked{color:var(--accent2);border-color:rgba(255,101,132,.3);background:rgba(255,101,132,.08)}
.btn-secondary.active-toggle{color:var(--accent3);border-color:rgba(255,200,55,.3);background:rgba(255,200,55,.08)}
.btn:active{transform:translateY(1px) scale(.97)}
.actions-row2{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(108,99,255,.92);backdrop-filter:blur(10px);color:#fff;padding:10px 24px;border-radius:13px;font-size:.82rem;font-weight:600;z-index:1000;transition:transform .35s,opacity .35s;opacity:0;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

.milestone{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:800;background:rgba(15,15,35,.96);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);border-radius:28px;padding:36px 46px;text-align:center;transition:transform .5s cubic-bezier(.34,1.56,.64,1),opacity .4s;opacity:0;pointer-events:none}
.milestone.show{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:auto}
.milestone-emoji{font-size:3.5rem;margin-bottom:10px;display:block}
.milestone h2{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--accent3),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.milestone p{color:var(--text2);font-size:.85rem}

.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:none;justify-content:center;align-items:flex-start;padding:30px 16px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:#111128;border:1px solid rgba(255,255,255,.1);border-radius:22px;width:100%;max-width:620px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 80px rgba(0,0,0,.6);animation:fadeUp .35s ease}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.modal-header h2{font-size:1.2rem;font-weight:700;display:flex;align-items:center;gap:8px}
.modal-close{width:34px;height:34px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:rgba(255,80,80,.2);border-color:rgba(255,80,80,.3)}
.modal-body{padding:16px 24px 24px;overflow-y:auto;flex:1}
.modal-body::-webkit-scrollbar{width:5px}
.modal-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}

.modal-search{width:100%;padding:10px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#fff;font-size:.85rem;font-family:'Inter',sans-serif;margin-bottom:14px;outline:none;transition:border-color .3s}
.modal-search::placeholder{color:rgba(255,255,255,.2)}
.modal-search:focus{border-color:rgba(108,99,255,.4)}

.fav-item{padding:12px 14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:13px;margin-bottom:8px;font-size:.83rem;color:rgba(255,255,255,.75);line-height:1.6;display:flex;align-items:flex-start;gap:10px;transition:all .25s;position:relative}
.fav-item:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.1)}
.fav-emoji-icon{font-size:1.3rem;flex-shrink:0;margin-top:1px}
.fav-content{flex:1}
.fav-cat-label{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.fav-remove{position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:rgba(255,255,255,.25);font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;opacity:0}
.fav-item:hover .fav-remove{opacity:1}
.fav-remove:hover{background:rgba(255,80,80,.2);border-color:rgba(255,80,80,.3);color:#ff5050}
.fav-empty{text-align:center;padding:30px 16px;color:var(--text3)}
.fav-empty-icon{font-size:2.5rem;margin-bottom:10px;display:block}
.cnt-badge{font-size:.8rem;color:var(--text3);font-weight:400}

.quiz-card{background:var(--card);backdrop-filter:blur(20px);border-radius:24px;border:1px solid var(--card-border);padding:30px 26px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden}
.quiz-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ffc837,#ff6584)}
.quiz-q{font-size:1.05rem;font-weight:400;line-height:1.6;margin-bottom:20px;color:var(--text)}
.quiz-options{display:flex;flex-direction:column;gap:8px}
.quiz-opt{padding:14px 18px;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.7);font-size:.88rem;cursor:pointer;transition:all .25s;text-align:left;font-family:'Inter',sans-serif}
.quiz-opt:hover{background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.2);transform:translateX(4px)}
.quiz-opt.correct{background:rgba(0,230,118,.15);border-color:rgba(0,230,118,.4);color:#69f0ae}
.quiz-opt.wrong{background:rgba(255,82,82,.15);border-color:rgba(255,82,82,.4);color:#ff5252}
.quiz-opt.disabled{pointer-events:none}
.quiz-score{display:flex;justify-content:center;gap:20px;margin-bottom:16px}
.quiz-stat{text-align:center}
.quiz-stat .q-num{font-size:1.8rem;font-weight:800}
.quiz-stat .q-label{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px}

.hist-item{padding:10px 14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);border-radius:11px;margin-bottom:6px;font-size:.8rem;color:rgba(255,255,255,.6);line-height:1.5;display:flex;gap:8px;align-items:flex-start}
.hist-item .h-emoji{font-size:1.1rem;flex-shrink:0}
.hist-time{font-size:.6rem;color:var(--text3);margin-top:2px}

#share-canvas{display:none}

@keyframes bounceIn{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeUp .5s ease forwards}
@media(max-width:500px){
.nav-brand{font-size:1.1rem}
.fact-card{padding:22px 16px}
.fact-text{font-size:.95rem}
.btn{padding:9px 14px;font-size:.78rem}
.btn-sm{padding:8px 12px;font-size:.72rem}
.modal{border-radius:16px}
}
</style>
</head>
<body>
<div class="bg-orbs"><span></span><span></span><span></span><span></span></div>
<canvas id="particles"></canvas>
<canvas id="confetti"></canvas>
<canvas id="share-canvas" width="600" height="400"></canvas>

<div class="toast" id="toast"></div>
<div class="milestone" id="milestone">
  <span class="milestone-emoji" id="ms-emoji"></span>
  <h2 id="ms-title"></h2>
  <p id="ms-text"></p>
</div>

<!-- FAV MODAL -->
<div class="modal-overlay" id="fav-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>&#11088; Favorilerim <span class="cnt-badge" id="fav-modal-count"></span></h2>
      <button class="modal-close" onclick="closeModal('fav-modal')">&#10005;</button>
    </div>
    <div class="modal-body">
      <input type="text" class="modal-search" id="fav-search" placeholder="Favorilerde ara..." oninput="renderFavList()">
      <div id="fav-list"></div>
    </div>
  </div>
</div>

<!-- HISTORY MODAL -->
<div class="modal-overlay" id="hist-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>&#128336; Gecmis <span class="cnt-badge" id="hist-count"></span></h2>
      <button class="modal-close" onclick="closeModal('hist-modal')">&#10005;</button>
    </div>
    <div class="modal-body" id="hist-list"></div>
  </div>
</div>

<!-- QUIZ MODAL -->
<div class="modal-overlay" id="quiz-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>&#129513; Bilgi Yarismasi</h2>
      <button class="modal-close" onclick="closeModal('quiz-modal')">&#10005;</button>
    </div>
    <div class="modal-body" id="quiz-body"></div>
  </div>
</div>

<!-- STATS MODAL -->
<div class="modal-overlay" id="stats-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>&#128202; Istatistikler</h2>
      <button class="modal-close" onclick="closeModal('stats-modal')">&#10005;</button>
    </div>
    <div class="modal-body" id="stats-body"></div>
  </div>
</div>

<div class="app">
<div class="container">

  <div class="top-nav animate-in">
    <div class="nav-brand">&#10024; Bilgi Hazinesi</div>
    <div class="nav-actions">
      <button class="nav-btn" onclick="openModal('stats-modal');renderStats()" title="Istatistikler">&#128202;</button>
      <button class="nav-btn" onclick="openModal('hist-modal');renderHistoryModal()" title="Gecmis">&#128336;</button>
      <button class="nav-btn" onclick="openModal('quiz-modal');generateQuiz()" title="Quiz">&#129513;</button>
      <button class="nav-btn" id="auto-nav" onclick="toggleAutoPlay()" title="Otomatik">&#9654;&#65039;</button>
    </div>
  </div>

  <div class="stats-bar animate-in" style="animation-delay:.08s">
    <div class="stat"><div class="num" id="seen-count">0</div><div class="label">Gorulen</div></div>
    <div class="stat"><div class="num" id="total-count">0</div><div class="label">Toplam</div></div>
    <div class="stat"><div class="num" id="fav-count">0</div><div class="label">Favori</div></div>
    <div class="stat"><div class="num" id="streak-count">0</div><div class="label">Seri</div></div>
  </div>

  <div class="progress-wrap animate-in" style="animation-delay:.1s">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-label" id="progress-label">0% kesfedildi</div>
  </div>

  <div class="categories animate-in" style="animation-delay:.12s" id="categories"></div>

  <div class="fact-card animate-in" style="animation-delay:.15s" id="fact-card">
    <div class="rarity-badge rarity-common" id="rarity-badge" style="display:none"></div>
    <span class="fact-emoji" id="fact-emoji">&#129504;</span>
    <div class="fact-category-badge" id="fact-badge" style="background:rgba(108,99,255,.2);color:#a29bfe">HAZIR MISIN?</div>
    <p class="fact-text" id="fact-text">Butona bas ve binlerce ilginc bilginin dunyasina dal!</p>
    <div class="fact-number" id="fact-number"></div>
  </div>

  <div class="actions animate-in" style="animation-delay:.18s">
    <button class="btn btn-primary" onclick="nextFact()" id="next-btn">&#127922; Yeni Bilgi</button>
    <button class="btn btn-sm btn-secondary" id="like-btn" onclick="toggleLike()">&#10084;&#65039; Begen</button>
    <button class="btn btn-sm btn-secondary" onclick="copyFact()">&#128203;</button>
    <button class="btn btn-sm btn-secondary" onclick="shareAsImage()">&#128444;&#65039;</button>
  </div>
  <div class="actions-row2 animate-in" style="animation-delay:.2s">
    <button class="btn btn-sm btn-secondary" onclick="openModal('fav-modal');openFavModal()">&#11088; Favoriler</button>
    <button class="btn btn-sm btn-secondary" onclick="shareFact()">&#128228; Paylas</button>
  </div>

</div>
</div>

// ===== STATE =====
var allFacts = [];
var seenFacts = {};
var favorites = JSON.parse(localStorage.getItem('bh_fav3') || '[]');
var currentFact = null;
var currentFactIndex = -1;
var categoryFilter = 'all';
var streak = 0;
var autoInt = null;
var history = [];
var quizScore = parseInt(localStorage.getItem('bh_quiz2') || '0');
var quizTotal = parseInt(localStorage.getItem('bh_quizT2') || '0');

function buildFacts() {
  allFacts = [];
  for (var catName in factsDB) {
    var cat = factsDB[catName];
    for (var i = 0; i < cat.facts.length; i++) {
      allFacts.push({text: cat.facts[i], category: catName, emoji: cat.emoji, color: cat.color});
    }
  }
}
buildFacts();

function getRarity(idx) {
  var h = (idx * 2654435761) >>> 0;
  var r = h % 100;
  if (r < 45) return {name: 'Siradan', cls: 'rarity-common'};
  if (r < 75) return {name: 'Nadir', cls: 'rarity-rare'};
  if (r < 93) return {name: 'Epik', cls: 'rarity-epic'};
  return {name: 'Efsanevi', cls: 'rarity-legendary'};
}

document.getElementById('total-count').textContent = allFacts.length;
document.getElementById('fav-count').textContent = favorites.length;

function renderCats() {
  var el = document.getElementById('categories');
  var cats = Object.keys(factsDB);
  var html = '<div class="cat-pill ' + (categoryFilter === 'all' ? 'active' : '') + '" onclick="setCat(\'all\')">' + allFacts.length + ' Tumu</div>';
  for (var i = 0; i < cats.length; i++) {
    var c = cats[i];
    var cat = factsDB[c];
    html += '<div class="cat-pill ' + (categoryFilter === c ? 'active' : '') + '" onclick="setCat(\'' + c + '\')">' + cat.emoji + ' ' + c + ' (' + cat.facts.length + ')</div>';
  }
  el.innerHTML = html;
}
renderCats();

function setCat(c) { categoryFilter = c; renderCats(); }

function getPool() {
  if (categoryFilter === 'all') return allFacts;
  return allFacts.filter(function(f) { return f.category === categoryFilter; });
}

// ===== MILESTONES =====
var MS = [
  {n:10, e:'\u2B50', t:'Ilk Adim!', m:'10 bilgi gordun!'},
  {n:25, e:'\uD83D\uDD25', t:'Ateslisin!', m:'25 bilgi!'},
  {n:50, e:'\uD83C\uDFC6', t:'Yari Yol!', m:'50 bilgi!'},
  {n:100, e:'\uD83D\uDC8E', t:'Yuzuncu!', m:'100 bilgi!'},
  {n:200, e:'\uD83D\uDE80', t:'Roket!', m:'200 bilgi!'},
  {n:300, e:'\uD83D\uDC51', t:'Kral!', m:'300 bilgi!'},
  {n:500, e:'\uD83C\uDF0C', t:'Efsane!', m:'500 bilgi!'}
];
var shownMS = {};

function checkMS() {
  var n = Object.keys(seenFacts).length;
  for (var i = 0; i < MS.length; i++) {
    var m = MS[i];
    if (n === m.n && !shownMS[m.n]) {
      shownMS[m.n] = true;
      showMilestone(m);
      launchConfetti();
      break;
    }
  }
}

function showMilestone(m) {
  var el = document.getElementById('milestone');
  document.getElementById('ms-emoji').textContent = m.e;
  document.getElementById('ms-title').textContent = m.t;
  document.getElementById('ms-text').textContent = m.m;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 3500);
}

// ===== NEXT FACT =====
function nextFact() {
  var pool = getPool();
  if (!pool.length) return;
  var unseen = pool.filter(function(f) { return !seenFacts[f.text]; });
  var src = unseen.length ? unseen : pool;
  var fact = src[Math.floor(Math.random() * src.length)];
  if (!seenFacts[fact.text]) { streak++; } else { streak = 0; }
  currentFact = fact;
  currentFactIndex = allFacts.indexOf(fact);
  seenFacts[fact.text] = true;
  history.unshift({text: fact.text, category: fact.category, emoji: fact.emoji, color: fact.color, time: new Date().toLocaleTimeString('tr-TR')});
  if (history.length > 100) history.pop();
  renderFactCard();
  checkMS();
}

function renderFactCard() {
  var fact = currentFact;
  if (!fact) return;
  var t = document.getElementById('fact-text');
  var em = document.getElementById('fact-emoji');
  var bg = document.getElementById('fact-badge');
  var nm = document.getElementById('fact-number');
  var rb = document.getElementById('rarity-badge');

  t.style.opacity = '0';
  setTimeout(function() {
    em.textContent = fact.emoji;
    em.style.animation = 'none';
    em.offsetHeight;
    em.style.animation = 'bounceIn .5s ease';
    bg.textContent = fact.category;
    bg.style.background = 'rgba(' + fact.color + ',.2)';
    bg.style.color = 'rgba(' + fact.color + ',1)';
    t.textContent = fact.text;
    t.style.opacity = '1';
    nm.textContent = '#' + (currentFactIndex + 1) + ' / ' + allFacts.length;
    var rarity = getRarity(currentFactIndex);
    rb.textContent = rarity.name;
    rb.className = 'rarity-badge ' + rarity.cls;
    rb.style.display = 'block';
    updateLikeBtn();

    var seenCount = Object.keys(seenFacts).length;
    document.getElementById('seen-count').textContent = seenCount;
    document.getElementById('streak-count').textContent = streak;
    var pct = ((seenCount / allFacts.length) * 100).toFixed(1);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-label').textContent = pct + '% kesfedildi (' + seenCount + '/' + allFacts.length + ')';
  }, 300);
}

// ===== LIKE =====
function toggleLike() {
  if (!currentFact) return;
  var i = favorites.findIndex(function(f) { return f.text === currentFact.text; });
  if (i >= 0) { favorites.splice(i, 1); showToast('Kaldirildi'); }
  else { favorites.push({text: currentFact.text, category: currentFact.category, emoji: currentFact.emoji, color: currentFact.color}); showToast('Favorilere eklendi!'); }
  saveFav();
  updateLikeBtn();
}

function saveFav() {
  localStorage.setItem('bh_fav3', JSON.stringify(favorites));
  document.getElementById('fav-count').textContent = favorites.length;
}

function updateLikeBtn() {
  var b = document.getElementById('like-btn');
  if (!currentFact) { b.classList.remove('liked'); return; }
  var l = favorites.some(function(f) { return f.text === currentFact.text; });
  b.classList.toggle('liked', l);
  b.innerHTML = l ? '&#128150; Begenildi' : '&#10084;&#65039; Begen';
}

// ===== MODALS =====
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(function(m) {
  m.addEventListener('click', function(e) {
    if (e.target === e.currentTarget) e.target.classList.remove('open');
  });
});

// ===== FAV MODAL =====
function openFavModal() {
  document.getElementById('fav-modal-count').textContent = '(' + favorites.length + ')';
  renderFavList();
}

function renderFavList() {
  var c = document.getElementById('fav-list');
  var q = (document.getElementById('fav-search').value || '').toLowerCase();
  var list = favorites;
  if (q) list = list.filter(function(f) { return f.text.toLowerCase().indexOf(q) >= 0 || f.category.toLowerCase().indexOf(q) >= 0; });
  if (!list.length) {
    c.innerHTML = '<div class="fav-empty"><span class="fav-empty-icon">' + (q ? '\uD83D\uDD0D' : '\u2B50') + '</span><p>' + (q ? 'Eslesen favori yok.' : 'Henuz favori eklenmedin!') + '</p></div>';
    return;
  }
  c.innerHTML = list.map(function(f) {
    var ri = favorites.indexOf(f);
    return '<div class="fav-item"><span class="fav-emoji-icon">' + f.emoji + '</span><div class="fav-content"><div class="fav-cat-label">' + f.category + '</div>' + f.text + '</div><button class="fav-remove" onclick="removeFav(' + ri + ')">&#10005;</button></div>';
  }).join('');
}

function removeFav(i) {
  favorites.splice(i, 1);
  saveFav();
  renderFavList();
  document.getElementById('fav-modal-count').textContent = '(' + favorites.length + ')';
  updateLikeBtn();
}

// ===== HISTORY =====
function renderHistoryModal() {
  document.getElementById('hist-count').textContent = '(' + history.length + ')';
  renderHistory();
}

function renderHistory() {
  var c = document.getElementById('hist-list');
  if (!history.length) {
    c.innerHTML = '<div class="fav-empty"><span class="fav-empty-icon">&#128336;</span><p>Henuz bilgi gormedin!</p></div>';
    return;
  }
  c.innerHTML = history.map(function(f) {
    return '<div class="hist-item"><span class="h-emoji">' + f.emoji + '</span><div><div style="margin-bottom:2px">' + f.text + '</div><div class="hist-time">' + f.time + '</div></div></div>';
  }).join('');
}

// ===== QUIZ =====
var quizAnswered = false;

function generateQuiz() {
  var seenKeys = Object.keys(seenFacts);
  if (seenKeys.length < 4) {
    document.getElementById('quiz-body').innerHTML = '<div class="fav-empty"><span class="fav-empty-icon">&#129513;</span><p>Quiz icin en az 4 bilgi gor!</p></div>';
    return;
  }
  var ct = seenKeys[Math.floor(Math.random() * seenKeys.length)];
  var cf = allFacts.find(function(f) { return f.text === ct; });
  if (!cf) { generateQuiz(); return; }
  var wrongCats = Object.keys(factsDB).filter(function(c) { return c !== cf.category; }).sort(function() { return Math.random() - 0.5; }).slice(0, 3);
  var options = [cf.category].concat(wrongCats).sort(function() { return Math.random() - 0.5; });
  quizAnswered = false;

  var successPct = quizTotal ? ((quizScore / quizTotal) * 100).toFixed(0) : 0;
  var html = '<div class="quiz-score">' +
    '<div class="quiz-stat"><div class="q-num" style="color:#69f0ae">' + quizScore + '</div><div class="q-label">Dogru</div></div>' +
    '<div class="quiz-stat"><div class="q-num" style="color:#ff5252">' + (quizTotal - quizScore) + '</div><div class="q-label">Yanlis</div></div>' +
    '<div class="quiz-stat"><div class="q-num" style="color:var(--accent4)">' + successPct + '%</div><div class="q-label">Basari</div></div>' +
    '</div>';
  html += '<div class="quiz-card"><div class="quiz-q">Bu bilgi hangi kategoriye ait?<br><br><em>"' + cf.text + '"</em></div>';
  html += '<div class="quiz-options">';
  for (var i = 0; i < options.length; i++) {
    var o = options[i];
    html += '<button class="quiz-opt" onclick="answerQuiz(this,\'' + o.replace(/'/g, "\\'") + '\',\'' + cf.category.replace(/'/g, "\\'") + '\')">' + factsDB[o].emoji + ' ' + o + '</button>';
  }
  html += '</div></div>';
  html += '<div style="text-align:center;margin-top:12px"><button class="btn btn-secondary btn-sm" onclick="generateQuiz()">Sonraki Soru</button></div>';
  document.getElementById('quiz-body').innerHTML = html;
}

function answerQuiz(btn, ans, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  quizTotal++;
  var ok = ans === correct;
  if (ok) quizScore++;
  localStorage.setItem('bh_quiz2', quizScore);
  localStorage.setItem('bh_quizT2', quizTotal);

  var opts = btn.parentElement.querySelectorAll('.quiz-opt');
  for (var i = 0; i < opts.length; i++) {
    opts[i].classList.add('disabled');
    if (opts[i].textContent.indexOf(correct) >= 0) opts[i].classList.add('correct');
  }
  if (!ok) btn.classList.add('wrong');
  if (ok) { showToast('Dogru!'); launchConfetti(); }
  else showToast('Yanlis!');
}

// ===== STATS =====
function renderStats() {
  var cats = Object.keys(factsDB);
  var rows = '';
  for (var i = 0; i < cats.length; i++) {
    var c = cats[i];
    var cat = factsDB[c];
    var total = cat.facts.length;
    var seen = cat.facts.filter(function(f) { return seenFacts[f]; }).length;
    var pct = total ? ((seen / total) * 100).toFixed(0) : 0;
    var faved = favorites.filter(function(f) { return f.category === c; }).length;
    rows += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)">' +
      '<span style="font-size:1.3rem">' + cat.emoji + '</span>' +
      '<div style="flex:1"><div style="font-size:.8rem;font-weight:600;margin-bottom:3px">' + c + '</div>' +
      '<div class="progress-bar" style="height:3px;margin-bottom:2px"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
      '<div style="font-size:.6rem;color:var(--text3)">' + seen + '/' + total + ' - ' + faved + ' fav</div></div>' +
      '<div style="font-size:.8rem;font-weight:700;color:var(--text2)">' + pct + '%</div></div>';
  }
  var ts = Object.keys(seenFacts).length;
  var ta = allFacts.length;
  document.getElementById('stats-body').innerHTML =
    '<div style="text-align:center;margin-bottom:16px">' +
    '<div style="font-size:3rem;font-weight:900;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent">' + ((ts / ta) * 100).toFixed(1) + '%</div>' +
    '<div style="font-size:.75rem;color:var(--text2)">Toplam Kesif</div>' +
    '<div style="font-size:.65rem;color:var(--text3);margin-top:4px">' + ts + '/' + ta + ' bilgi - ' + favorites.length + ' fav - Seri: ' + streak + ' - Quiz: ' + quizScore + '/' + quizTotal + '</div></div>' +
    '<h3 style="font-size:.8rem;font-weight:600;margin-bottom:10px;color:var(--text2)">Kategori Bazli</h3>' + rows;
}

// ===== COPY / SHARE =====
function copyFact() {
  if (!currentFact) return;
  navigator.clipboard.writeText(currentFact.text).then(function() { showToast('Kopyalandi!'); }).catch(function() { showToast('Hata'); });
}

function shareFact() {
  if (!currentFact) return;
  if (navigator.share) navigator.share({title: 'Bilgi Hazinesi', text: currentFact.text}).catch(function() {});
  else { copyFact(); showToast('Kopyalandi!'); }
}

function shareAsImage() {
  if (!currentFact) return;
  var c = document.getElementById('share-canvas'), ctx = c.getContext('2d');
  c.width = 600; c.height = 400;
  var g = ctx.createLinearGradient(0, 0, 600, 400);
  g.addColorStop(0, '#1a1a3e'); g.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = g; ctx.fillRect(0, 0, 600, 400);
  var g2 = ctx.createLinearGradient(0, 0, 600, 0);
  g2.addColorStop(0, '#6c63ff'); g2.addColorStop(0.5, '#ff6584'); g2.addColorStop(1, '#ffc837');
  ctx.fillStyle = g2; ctx.fillRect(0, 0, 600, 4);
  ctx.font = '600 14px Inter,sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,.4)';
  ctx.textAlign = 'center';
  ctx.fillText(currentFact.emoji + ' ' + currentFact.category, 300, 50);
  ctx.font = '300 18px Inter,sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,.9)';
  var words = currentFact.text.split(' '), lines = [], line = '';
  words.forEach(function(w) {
    if (ctx.measureText(line + w).width > 480) { lines.push(line.trim()); line = ''; }
    line += w + ' ';
  });
  lines.push(line.trim());
  lines.forEach(function(l, i) { ctx.fillText(l, 300, 160 + i * 30); });
  ctx.font = '800 12px Inter,sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,.3)';
  ctx.fillText('Bilgi Hazinesi', 300, 370);
  c.toBlob(function(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'bilgi.png'; a.click();
    URL.revokeObjectURL(url);
    showToast('Indirildi!');
  });
}

});

// ===== PARTICLES =====
var pCv = document.getElementById('particles');
var pCx = pCv.getContext('2d');
var pts = [];

function rC() { pCv.width = innerWidth; pCv.height = innerHeight; }
rC();
addEventListener('resize', rC);

function Particle() { this.reset(); }
Particle.prototype.reset = function() {
  this.x = Math.random() * pCv.width;
  this.y = Math.random() * pCv.height;
  this.s = Math.random() * 1.5 + 0.5;
  this.sx = (Math.random() - 0.5) * 0.3;
  this.sy = (Math.random() - 0.5) * 0.3;
  this.o = Math.random() * 0.3 + 0.05;
};
Particle.prototype.update = function() {
  this.x += this.sx; this.y += this.sy;
  if (this.x < 0 || this.x > pCv.width || this.y < 0 || this.y > pCv.height) this.reset();
};
Particle.prototype.draw = function() {
  pCx.beginPath();
  pCx.arc(this.x, this.y, this.s, 0, Math.PI * 2);
  pCx.fillStyle = 'rgba(255,255,255,' + this.o + ')';
  pCx.fill();
};

for (var i = 0; i < 60; i++) pts.push(new Particle());

function animateParticles() {
  pCx.clearRect(0, 0, pCv.width, pCv.height);
  for (var i = 0; i < pts.length; i++) { pts[i].update(); pts[i].draw(); }
  for (var i = 0; i < pts.length; i++) {
    for (var j = i + 1; j < pts.length; j++) {
      var dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
      var d = Math.sqrt(dx * dx + dy * dy);
      if (d < 90) {
        pCx.beginPath();
        pCx.strokeStyle = 'rgba(255,255,255,' + (0.04 * (1 - d / 90)) + ')';
        pCx.lineWidth = 0.5;
        pCx.moveTo(pts[i].x, pts[i].y);
        pCx.lineTo(pts[j].x, pts[j].y);
        pCx.stroke();
      }
    }
  }
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ===== CONFETTI =====
var cC = document.getElementById('confetti');
var cx = cC.getContext('2d');
function rCC() { cC.width = innerWidth; cC.height = innerHeight; }
rCC();
addEventListener('resize', rCC);

var cPs = [];
function launchConfetti() {
  cPs = [];
  var cols = ['#6c63ff', '#ff6584', '#ffc837', '#00d2ff', '#ff9a9e', '#a29bfe', '#55efc4', '#fd79a8'];
  for (var i = 0; i < 120; i++) {
    cPs.push({
      x: cC.width / 2 + (Math.random() - 0.5) * 200,
      y: cC.height / 2,
      vx: (Math.random() - 0.5) * 14,
      vy: Math.random() * -16 - 5,
      sz: Math.random() * 7 + 3,
      c: cols[Math.floor(Math.random() * cols.length)],
      rot: Math.random() * 360,
      rs: (Math.random() - 0.5) * 10,
      l: 1
    });
  }
  animateConfetti();
}

function animateConfetti() {
  cx.clearRect(0, 0, cC.width, cC.height);
  var alive = false;
  for (var i = 0; i < cPs.length; i++) {
    var p = cPs[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.35;
    p.rot += p.rs; p.l -= 0.009;
    if (p.l > 0) {
      alive = true;
      cx.save();
      cx.translate(p.x, p.y);
      cx.rotate(p.rot * Math.PI / 180);
      cx.fillStyle = p.c;
      cx.globalAlpha = p.l;
      cx.fillRect(-p.sz / 2, -p.sz / 2, p.sz, p.sz);
      cx.restore();
    }
  }
  if (alive) requestAnimationFrame(animateConfetti);
  else cx.clearRect(0, 0, cC.width, cC.height);
}

// ===== TOUCH SWIPE =====
var touchX = 0;
document.addEventListener('touchstart', function(e) { touchX = e.touches[0].clientX; }, {passive: true});
document.addEventListener('touchend', function(e) {
  var d = e.changedTouches[0].clientX - touchX;
  if (Math.abs(d) > 80) nextFact();
}, {passive: true});
